name: Build iOS IPA

on:
  workflow_dispatch:  # manual trigger button

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build IPA (no signing)
        run: |
          xcodebuild \
            -project QuickDrop.xcodeproj \
            -scheme QuickDropiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/QuickDrop.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -r build/QuickDrop.xcarchive/Products/Applications/QuickDropiOS.app build/Payload/
          cd build && zip -r QuickDrop.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: QuickDrop-iOS
          path: build/QuickDrop.ipa
          retention-days: 7